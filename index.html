<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="เก่งเก่ง">
<meta name="theme-color" content="#FFF3E0">
<title>เก่งเก่ง · เรียนสนุก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF6E9; --bg2:#FFEFD8;
  --ink:#3A2E28; --muted:#9A8B80;
  --card:#FFFFFF; --line:#F0E3D2;
  --thai:#FF7A59; --thai-soft:#FFE9E2;
  --eng:#31B6C9;  --eng-soft:#DDF4F7;
  --math:#8B7BE8; --math-soft:#ECE8FB;
  --star:#FFC13C; --good:#3FBF7F; --good-soft:#E1F6EC;
  --shadow:0 8px 0 rgba(0,0,0,.06), 0 14px 28px rgba(120,80,40,.14);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  font-family:'Mali','Fredoka',system-ui,-apple-system,'Segoe UI',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1200px 500px at 15% -10%, #FFF9F0 0%, transparent 60%),
    radial-gradient(900px 500px at 100% 0%, #FFEAD6 0%, transparent 55%),
    var(--bg);
  -webkit-user-select:none; user-select:none; touch-action:manipulation;
  overflow-x:hidden;
}
#app{max-width:820px; margin:0 auto; padding:14px 16px 30px; min-height:100%;}

/* top bar */
.top{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.top .brand{font-family:'Fredoka'; font-weight:700; font-size:22px; letter-spacing:.3px; color:var(--thai); display:flex; align-items:center; gap:8px;}
.top .brand b{font-family:'Mali'; font-weight:700; color:var(--ink);}
.spacer{flex:1;}
.pill{
  display:inline-flex; align-items:center; gap:7px; background:#fff; border:2px solid var(--line);
  border-radius:999px; padding:8px 14px; font-family:'Fredoka'; font-weight:600; font-size:18px;
  box-shadow:0 4px 0 rgba(0,0,0,.05); color:var(--ink);
}
.pill.star b{color:#C9860E;}
.iconbtn{
  width:48px; height:48px; border-radius:16px; border:2px solid var(--line); background:#fff;
  font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.05); transition:transform .08s;
}
.iconbtn:active{transform:translateY(2px);}

/* home */
.hero{text-align:center; padding:14px 8px 6px;}
.mascot{font-size:78px; line-height:1; display:inline-block; animation:bob 2.6s ease-in-out infinite; filter:drop-shadow(0 10px 12px rgba(0,0,0,.12));}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-12px) rotate(2deg);}}
.hero h1{font-family:'Mali'; font-weight:700; font-size:30px; margin:8px 0 2px;}
.hero p{color:var(--muted); font-size:16px; margin:0 0 6px;}

.menu{display:grid; grid-template-columns:1fr; gap:16px; margin-top:14px;}
@media(min-width:620px){.menu{grid-template-columns:1fr 1fr 1fr;}}
.tile{
  border:none; cursor:pointer; text-align:left; color:#fff; border-radius:26px; padding:22px 20px;
  min-height:150px; display:flex; flex-direction:column; justify-content:space-between;
  box-shadow:var(--shadow); transition:transform .1s; position:relative; overflow:hidden;
}
.tile:active{transform:translateY(3px) scale(.995);}
.tile .emo{font-size:52px; line-height:1;}
.tile .t{font-family:'Mali'; font-weight:700; font-size:26px;}
.tile .s{font-size:15px; opacity:.92; margin-top:2px;}
.tile .glow{position:absolute; right:-30px; top:-30px; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,.18);}
.tile.thai{background:linear-gradient(150deg,#FF9166,#FF6A45);}
.tile.eng{background:linear-gradient(150deg,#43C6D8,#26A6BA);}
.tile.math{background:linear-gradient(150deg,#9C8CF0,#7A67E0);}

/* activity screen */
.screen{animation:fade .25s ease both;}
@keyframes fade{from{opacity:0; transform:translateY(8px);}to{opacity:1; transform:none;}}
.head{display:flex; align-items:center; gap:12px; margin:4px 0 14px;}
.head h2{font-family:'Mali'; font-weight:700; font-size:24px; margin:0;}
.head .dot{width:14px; height:14px; border-radius:50%;}

.tabs{display:inline-flex; background:#fff; border:2px solid var(--line); border-radius:999px; padding:5px; gap:4px; margin-bottom:16px;}
.tab{border:none; background:transparent; font-family:'Mali'; font-weight:600; font-size:17px; color:var(--muted); padding:9px 20px; border-radius:999px; cursor:pointer;}
.tab.on{color:#fff;}
.tab.on.thai{background:var(--thai);} .tab.on.eng{background:var(--eng);} .tab.on.math{background:var(--math);}

.catrow{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 8px; margin-bottom:6px; -webkit-overflow-scrolling:touch;}
.catrow::-webkit-scrollbar{height:0;}
.catchip{flex:0 0 auto; border:2px solid var(--line); background:#fff; color:var(--muted);
  font-family:'Mali'; font-weight:600; font-size:16px; padding:8px 15px; border-radius:999px; cursor:pointer; white-space:nowrap;}
.catchip.on{background:var(--thai-soft); border-color:var(--thai); color:#D8492A;}
.catrow.eng .catchip.on{background:var(--eng-soft); border-color:var(--eng); color:#1C7A88;}
.chip.spellchip{border-color:var(--thai); color:#D8492A;}
.chip.spellchip.eng{border-color:var(--eng); color:#1C7A88; font-family:'Fredoka';}

/* flashcard */
.card{
  background:var(--card); border:3px solid var(--line); border-radius:30px; padding:26px 20px;
  box-shadow:var(--shadow); text-align:center; position:relative;
}
.card .pic{font-size:96px; line-height:1; margin-bottom:6px;}
.bigword{font-family:'Mali'; font-weight:700; font-size:96px; line-height:1.05; cursor:pointer; display:inline-block;}
.bigword.pop{animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.14);}100%{transform:scale(1);}}
.sub{color:var(--muted); font-size:17px; margin-top:4px;}
.pieces{display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; margin:16px 0 4px;}
.chip{
  min-width:76px; height:76px; padding:0 10px; border-radius:18px; background:#fff; border:3px solid;
  font-family:'Mali'; font-weight:700; font-size:44px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:transform .08s;
}
.chip:active{transform:scale(.94);}
.chip.c{border-color:var(--thai); color:#D8492A;} .chip.v{border-color:var(--math); color:#6D5AD6;}
.op{font-size:34px; font-weight:700; color:var(--muted);}

.row{display:flex; gap:12px; margin-top:20px;}
.btn{
  flex:1; border:none; border-radius:20px; padding:16px; font-family:'Mali'; font-weight:700; font-size:20px;
  cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.10); transition:transform .08s; color:#fff;
}
.btn:active{transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.10);}
.btn.ghost{background:#fff; color:var(--ink); border:2px solid var(--line); box-shadow:0 5px 0 rgba(0,0,0,.05);}
.btn.play{background:var(--good);}
.btn.thai{background:var(--thai);} .btn.eng{background:var(--eng);} .btn.math{background:var(--math);}

/* quiz */
.prompt{background:var(--card); border:3px solid var(--line); border-radius:26px; padding:22px; text-align:center; box-shadow:var(--shadow);}
.prompt .q{font-family:'Fredoka'; font-weight:700; font-size:56px; letter-spacing:1px;}
.prompt .qth{font-family:'Mali';}
.visual{font-size:40px; line-height:1.35; margin:6px 0 2px; word-break:break-word;}
.hintbtn{margin-top:8px;}
.options{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:18px;}
.opt{
  border:3px solid var(--line); background:#fff; border-radius:22px; padding:20px 10px; cursor:pointer;
  font-family:'Fredoka'; font-weight:700; font-size:40px; color:var(--ink); box-shadow:0 6px 0 rgba(0,0,0,.06);
  transition:transform .08s; min-height:84px;
}
.opt.thword{font-family:'Mali'; font-size:46px;}
.opt:active{transform:translateY(3px);}
.opt.right{background:var(--good-soft); border-color:var(--good); color:#238a56; animation:pop .4s;}
.opt.wrong{background:#FDE6E1; border-color:#F0A08C; color:#c14b2c; animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}

.opsel{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:8px;}
.opsel .btn{font-size:22px;}

.feedback{text-align:center; font-family:'Mali'; font-weight:700; font-size:24px; min-height:34px; margin-top:14px;}
.feedback.g{color:var(--good);} .feedback.b{color:#E08a6a;}

.progress{display:flex; gap:6px; justify-content:center; margin:12px 0 2px;}
.progress i{width:12px; height:12px; border-radius:50%; background:var(--line); display:inline-block;}
.progress i.done{background:var(--star);}

/* confetti */
.confetti{position:fixed; top:-40px; font-size:26px; pointer-events:none; z-index:60; animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg); opacity:.9;}}

.foot{text-align:center; color:var(--muted); font-size:13px; margin-top:26px;}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important;}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------- state & helpers ---------------- */
const App = document.getElementById('app');
const State = { stars: 0, muted: false, screen: 'home' };

// persistent storage that never breaks (falls back to memory in sandboxed previews)
const Mem = {};
const Store = {
  get(k){ try{ const v=localStorage.getItem(k); return v===null?(k in Mem?Mem[k]:null):v; }catch(e){ return k in Mem?Mem[k]:null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ Mem[k]=v; } }
};
State.stars = parseInt(Store.get('stars')||'0',10) || 0;
State.muted = Store.get('muted')==='1';

/* ---- audio: pre-generated clips + speech fallback ---- */
// Pre-generated voice clips (made by generate_audio.py, served from /audio). Primary source.
// If a clip is missing, falls back to the optional live server, then the device voice.
let clipMap = {};            // exact text -> 'audio/<file>'
const clipObj = {};          // url -> Audio (cache)
fetch('audio/manifest.json')
  .then(r=> r.ok ? r.json() : null)
  .then(m=>{ if(m){ for(const k in m) clipMap[k] = 'audio/' + m[k]; } })
  .catch(()=>{});

// Optional live OmniVoice server (off by default now that clips exist). Set enabled:true to use it.
const TTS = {
  enabled: false,
  url: 'https://physicochemical-kathlyn-joltily.ngrok-free.dev/v1/audio/speech',
  timeoutMs: 4500,
};
const audioCache = new Map();
let curAudio = null, omniFails = 0;

// ---- device voice (Web Speech API) config ----
// อยากล็อกเสียงเจาะจง ใส่ชื่อเสียงที่ thName/enName (เปิด console แล้วพิมพ์ listVoices() เพื่อดูชื่อ)
// เว้นว่าง = เลือกเสียงที่ดีที่สุดในเครื่องให้อัตโนมัติ.  rate = ความเร็วรวม (น้อย=ช้า/ชัด)
const VOICE = { thName:'', enName:'', rate:0.82, pitch:1.08 };
let voices = [], vTh=null, vEn=null;
function chooseVoice(lang, forced){
  const pref = voices.filter(v=>v.lang && v.lang.toLowerCase().startsWith(lang));
  if(forced){ const f = voices.find(v=>v.name===forced); if(f) return f; }
  return pref.find(v=>/enhanced|premium|siri|natural|neural/i.test(v.name))  // เสียงคุณภาพสูง
      || pref.find(v=>v.localService)                                        // เสียงในเครื่อง (ลื่น/ออฟไลน์)
      || pref[0] || null;
}
function loadVoices(){
  voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  vTh = chooseVoice('th', VOICE.thName);
  vEn = chooseVoice('en', VOICE.enName);
}
function pickVoice(lang){ if(!voices.length) loadVoices(); return lang.slice(0,2)==='th' ? vTh : vEn; }
window.listVoices = () => (window.speechSynthesis?speechSynthesis.getVoices():[])
  .map(v=>`${v.name} [${v.lang}]${v.localService?'':' (network)'}`);
if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
function stopAudio(){
  if(curAudio){ try{ curAudio.pause(); }catch(e){} curAudio=null; }
  if(window.speechSynthesis){ try{ speechSynthesis.cancel(); }catch(e){} }
}
function playClip(url){
  let a = clipObj[url];
  if(!a){ a = new Audio(url); clipObj[url] = a; }
  try{ a.currentTime = 0; }catch(e){}
  curAudio = a;
  return a.play();
}
async function speakOmni(text, speed){
  const key = text+'|'+speed;
  try{
    let url = audioCache.get(key);
    if(!url){
      const ctl = new AbortController();
      const to = setTimeout(()=>ctl.abort(), TTS.timeoutMs);
      const r = await fetch(TTS.url, { method:'POST',
        headers:{'Content-Type':'application/json','ngrok-skip-browser-warning':'true'},
        body: JSON.stringify({ input:text, speed:speed }), signal: ctl.signal });
      clearTimeout(to);
      if(!r.ok) throw new Error('http '+r.status);
      const blob = await r.blob();
      if(blob.size < 1200) throw new Error('too small');
      url = URL.createObjectURL(blob); audioCache.set(key, url);
    }
    await playClip(url); omniFails = 0; return true;
  }catch(e){ if(++omniFails >= 2) TTS.enabled = false; return false; }
}
function speakBrowser(text, lang, rate){
  if(!window.speechSynthesis) return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = Math.max(0.5, Math.min(1.2, (rate||0.9) * (VOICE.rate/0.9)));
    u.pitch = VOICE.pitch;
    const v = pickVoice(lang.slice(0,2)); if(v) u.voice = v;
    speechSynthesis.speak(u);
  }catch(e){}
}
// Speak one string: pre-generated clip -> (optional) live server -> device voice.
function speak(text, lang='th-TH', rate=0.9){
  if(State.muted) return;
  stopAudio();
  const url = clipMap[text];
  if(url){ playClip(url).catch(()=>speakBrowser(text, lang, Math.max(0.6, rate-0.05))); return; }
  const speed = Math.max(0.5, Math.min(1.1, rate));
  if(TTS.enabled && TTS.url){
    speakOmni(text, speed).then(ok=>{ if(!ok) speakBrowser(text, lang, Math.max(0.6, rate-0.05)); });
  }else{
    speakBrowser(text, lang, Math.max(0.6, rate-0.05));
  }
}
// Play several clips back-to-back (e.g. spell then word, or a math sentence).
// If any piece has no clip, speaks the whole phrase with the device voice instead.
function speakSeq(parts, lang='th-TH'){
  if(State.muted) return;
  stopAudio();
  const urls = parts.map(p=>clipMap[p]);
  if(urls.some(u=>!u)){ speakBrowser(parts.join(' '), lang, 0.82); return; }
  let i=0;
  const next=()=>{
    if(i>=urls.length) return;
    const a = new Audio(urls[i]); curAudio = a;
    a.onended = ()=>{ i++; next(); };
    a.play().catch(()=>{});
  };
  next();
}
let AC=null;
function chime(good){
  if(State.muted) return;
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const notes = good ? [523,659,784] : [330,247];
    notes.forEach((f,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sine'; o.frequency.value=f;
      o.connect(g); g.connect(AC.destination);
      const t=AC.currentTime + i*0.11;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
      o.start(t); o.stop(t+0.24);
    });
  }catch(e){}
}
function confetti(){
  const em=['🎉','⭐','🌟','🎊','✨','🧡','💙','💜'];
  for(let i=0;i<26;i++){
    const s=document.createElement('div');
    s.className='confetti'; s.textContent=em[i%em.length];
    s.style.left=Math.random()*100+'vw';
    s.style.animationDuration=(1.6+Math.random()*1.4)+'s';
    s.style.fontSize=(20+Math.random()*22)+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),3200);
  }
}
function addStar(n=1){
  State.stars+=n; Store.set('stars',State.stars);
  const el=document.getElementById('starcount'); if(el) el.textContent=State.stars;
}
const rnd = a => a[Math.floor(Math.random()*a.length)];
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
const praise = ['เก่งมาก!','สุดยอด!','ถูกต้อง!','เยี่ยมเลย!','เก่งที่สุด!'];
const retry  = ['ลองอีกครั้งนะ','เกือบแล้ว!','ไม่เป็นไร ลองใหม่'];

/* ---------------- data ---------------- */
// Thai word bank, grouped by final-consonant class (มาตราตัวสะกด). s = แจกลูก (spell-out)
const WORDS = [
  {key:'kaka', label:'แม่ ก กา', hint:'ไม่มีตัวสะกด', words:[
    {t:'กา',e:'🐦',s:'กอ อา'}, {t:'ตา',e:'👁️',s:'ตอ อา'}, {t:'ปู',e:'🦀',s:'ปอ อู'},
    {t:'งู',e:'🐍',s:'งอ อู'}, {t:'หู',e:'👂',s:'หอ อู'}, {t:'ปลา',e:'🐟',s:'ปอ ลอ อา'},
    {t:'หมา',e:'🐶',s:'หอ มอ อา'}, {t:'เสือ',e:'🐯',s:'สอ เอือ'}, {t:'เรือ',e:'🚤',s:'รอ เอือ'},
    {t:'ไก่',e:'🐔',s:'กอ ไอ ไม้เอก'}, {t:'มือ',e:'🖐️',s:'มอ อือ'}, {t:'ปี',e:'🎂',s:'ปอ อี'},
  ]},
  {key:'kong', label:'แม่ กง', hint:'สะกดด้วย ง', words:[
    {t:'ลิง',e:'🐒',s:'ลอ อิ งอ'}, {t:'ช้าง',e:'🐘',s:'ชอ อา งอ ไม้โท'}, {t:'ธง',e:'🚩',s:'ทอ งอ'},
    {t:'ผึ้ง',e:'🐝',s:'ผอ อึ งอ ไม้โท'}, {t:'กลอง',e:'🥁',s:'กอ ลอ ออ งอ'}, {t:'ถัง',e:'🪣',s:'ถอ อะ งอ'},
    {t:'หงส์',e:'🦢',s:'หอ งอ'}, {t:'ยุง',e:'🦟',s:'ยอ อุ งอ'},
  ]},
  {key:'kon', label:'แม่ กน', hint:'สะกดด้วย น', words:[
    {t:'กิน',e:'🍽️',s:'กอ อิ นอ'}, {t:'ฝน',e:'🌧️',s:'ฝอ นอ'}, {t:'บ้าน',e:'🏠',s:'บอ อา นอ ไม้โท'},
    {t:'นอน',e:'😴',s:'นอ ออ นอ'}, {t:'จาน',e:'🍽️',s:'จอ อา นอ'}, {t:'ปีน',e:'🧗',s:'ปอ อี นอ'},
    {t:'ฟัน',e:'🦷',s:'ฟอ อะ นอ'}, {t:'ต้น',e:'🌱',s:'ตอ นอ ไม้โท'},
  ]},
  {key:'kom', label:'แม่ กม', hint:'สะกดด้วย ม', words:[
    {t:'ส้ม',e:'🍊',s:'สอ มอ ไม้โท'}, {t:'นม',e:'🥛',s:'นอ มอ'}, {t:'ลม',e:'🌬️',s:'ลอ มอ'},
    {t:'แยม',e:'🍓',s:'ยอ แอ มอ'}, {t:'ยิ้ม',e:'😊',s:'ยอ อิ มอ ไม้โท'}, {t:'เข็ม',e:'📌',s:'ขอ เอะ มอ'},
    {t:'ปาล์ม',e:'🌴',s:'ปอ อา มอ'}, {t:'ครีม',e:'🍦',s:'คอ รอ อี มอ'},
  ]},
  {key:'koey', label:'แม่ เกย', hint:'สะกดด้วย ย', words:[
    {t:'ควาย',e:'🐃',s:'คอ วอ อา ยอ'}, {t:'ยาย',e:'👵',s:'ยอ อา ยอ'}, {t:'เนย',e:'🧈',s:'นอ เอ ยอ'},
    {t:'สร้อย',e:'📿',s:'สอ รอ ออ ยอ ไม้โท'}, {t:'นาย',e:'👨',s:'นอ อา ยอ'}, {t:'สาย',e:'⛓️',s:'สอ อา ยอ'},
  ]},

/* ---------------- top bar & router ---------------- */
function topBar(){
  return `<div class="top">
    <div class="brand">🦊 <b>เก่งเก่ง</b></div>
    <div class="spacer"></div>
    <div class="pill star">⭐ <b id="starcount">${State.stars}</b></div>
    <button class="iconbtn" id="mute">${State.muted?'🔇':'🔊'}</button>
  </div>`;
}
function wireTop(){
  const m=document.getElementById('mute');
  if(m) m.onclick=()=>{ State.muted=!State.muted; Store.set('muted',State.muted?'1':'0'); m.textContent=State.muted?'🔇':'🔊'; if(window.speechSynthesis)speechSynthesis.cancel(); };
}
function go(screen){ State.screen=screen; render(); window.scrollTo(0,0); }

function render(){
  if(State.screen==='home') return renderHome();
  if(State.screen==='thai') return renderThai();
  if(State.screen==='eng')  return renderEng();
  if(State.screen==='math') return renderMath();
}

function thaiLearn(){
  const cat=WORDS[thaiCat]; const list=cat.words; if(thaiIdx>=list.length) thaiIdx=0;

  document.getElementById('area').innerHTML = `

  document.querySelectorAll('.spellchip').forEach((el,i)=>el.onclick=()=>speak(chips[i],'th-TH',0.85));
  document.getElementById('blend').onclick=()=>{ pop(); speakSeq([w.s, w.t]); };
  document.getElementById('next').onclick=()=>{ thaiIdx=(thaiIdx+1)%list.length; thaiLearn(); setTimeout(()=>speak(list[thaiIdx].t,'th-TH',0.9),150); };
  document.getElementById('prev').onclick=()=>{ thaiIdx=(thaiIdx-1+list.length)%list.length; thaiLearn(); setTimeout(()=>speak(list[thaiIdx].t,'th-TH',0.9),150); };
  setTimeout(say,120);
}
let tq=null;
function thaiPlay(){
  const list=WORDS[thaiCat].words;
  const answer=rnd(list);
  let pool=list.filter(x=>x.t!==answer.t);
  while(pool.length<2){ const x=rnd(ALLW); if(x.t!==answer.t && !pool.find(p=>p.t===x.t)) pool.push(x); }
  const opts=shuffle([answer, ...shuffle(pool).slice(0,2)]);
  const fs=wsize(opts.reduce((a,b)=>a.t.length>b.t.length?a:b).t, 44);
  tq={answer,done:false};
  document.getElementById('area').innerHTML = `
    <div class="prompt">
      <div class="visual" style="font-size:74px">${answer.e}</div>
      <div class="sub">แตะปุ่มฟังเสียง แล้วเลือกคำที่ได้ยิน</div>
      <div class="row"><button class="btn play" id="hear">🔊 ฟังอีกครั้ง</button></div>
    </div>
    <div class="options">
      ${opts.map(o=>`<button class="opt thword" data-w="${o.t}" style="font-size:${fs}px">${o.t}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>`;
  document.getElementById('hear').onclick=()=>speak(answer.t,'th-TH',0.9);
  speak(answer.t,'th-TH',0.9);
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(tq.done) return;
    const fb=document.getElementById('fb');
    if(b.dataset.w===answer.t){
      tq.done=true; b.classList.add('right'); chime(true); confetti(); addStar();
      const p=rnd(praise); fb.className='feedback g'; fb.textContent=p+' ⭐'; speak(p,'th-TH',1);
      setTimeout(thaiPlay,1400);
    }else{
      b.classList.add('wrong'); chime(false);
      const r=rnd(retry); fb.className='feedback b'; fb.textContent=r; speak(r,'th-TH',1);
      setTimeout(()=>b.classList.remove('wrong'),450);
    }
  });
}

function engPlayWord(cat){
  const list=cat.words; const answer=rnd(list);

  while(pool.length<3){ const x=rnd(ALLE); if(x.w!==answer.w && !pool.find(p=>p.w===x.w)) pool.push(x); }
  const opts=shuffle([answer, ...shuffle(pool).slice(0,3)]);
  const fs=wsize(opts.reduce((a,b)=>a.w.length>b.w.length?a:b).w, 30);
  eq={answer,done:false};
  document.getElementById('area').innerHTML=`
    <div class="prompt">
      <div class="visual" style="font-size:78px">${answer.e}</div>
      <div class="sub">ฟังเสียง แล้วเลือกคำที่ถูก</div>
      <div class="row"><button class="btn play" id="hear">🔊 ฟังอีกครั้ง</button></div>
    </div>
    <div class="options">
      ${opts.map(o=>`<button class="opt" data-w="${o.w}" style="font-family:'Fredoka';color:var(--eng);font-size:${fs}px">${o.w}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>`;
  const hear=()=>speak(answer.w,'en-US',0.85);
  document.getElementById('hear').onclick=hear;
  hear();
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(eq.done) return;
    const fb=document.getElementById('fb');
    if(b.dataset.w===answer.w){
      eq.done=true; b.classList.add('right'); chime(true); confetti(); addStar();
      const p=rnd(praise); fb.className='feedback g'; fb.textContent=p+' ⭐'; speak(answer.w,'en-US',0.9);
      setTimeout(()=>engPlayWord(cat),1400);
    }else{
      b.classList.add('wrong'); chime(false);
      fb.className='feedback b'; fb.textContent=rnd(retry);
      setTimeout(()=>b.classList.remove('wrong'),450);
    }
  });
}

/* ---------------- MATH ---------------- */
let mathOp=null, mq=null;
function renderMath(){
  App.innerHTML = topBar() + `
  <div class="screen">
    <div class="head"><button class="iconbtn" id="back">🏠</button>
      <span class="dot" style="background:var(--math)"></span><h2>เลข · บวก ลบ คูณ</h2></div>
    <div id="area"></div>
  </div>`;
  wireTop();
  document.getElementById('back').onclick=()=> mathOp? (mathOp=null,renderMath()) : go('home');
  mathOp? mathQuiz() : mathMenu();
}
function mathMenu(){
  document.getElementById('area').innerHTML=`
    <div class="prompt"><div class="visual" style="font-size:64px">🔢</div>
      <div class="sub">อยากเล่นแบบไหนดี?</div></div>
    <div class="opsel" style="margin-top:18px">
      <button class="btn math" data-op="+">➕ บวก</button>
      <button class="btn math" data-op="-">➖ ลบ</button>
      <button class="btn math" data-op="×">✖️ คูณ</button>
    </div>`;
  document.querySelectorAll('[data-op]').forEach(b=>b.onclick=()=>{ mathOp=b.dataset.op; chime(true); renderMath(); });
}
// Thai number words 0–25 (spoken math is composed from these + operator clips)
const NUMTH=['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า','สิบ','สิบเอ็ด','สิบสอง','สิบสาม','สิบสี่','สิบห้า','สิบหก','สิบเจ็ด','สิบแปด','สิบเก้า','ยี่สิบ','ยี่สิบเอ็ด','ยี่สิบสอง','ยี่สิบสาม','ยี่สิบสี่','ยี่สิบห้า'];
const OPWORD={'+':'บวก','-':'ลบ','×':'คูณ'};
function numTH(n){ return (n>=0 && n<NUMTH.length) ? NUMTH[n] : String(n); }
function makeProblem(op){
  let a,b,ans,vis='';
  if(op==='+'){ a=1+Math.floor(Math.random()*9); b=1+Math.floor(Math.random()*(10-a<1?1:11-a)); if(a+b>15){b=1+Math.floor(Math.random()*5);} ans=a+b;
    vis='🍎'.repeat(a)+'  ➕  '+'🍏'.repeat(b); }
  else if(op==='-'){ a=3+Math.floor(Math.random()*10); b=1+Math.floor(Math.random()*(a-1)); ans=a-b;
    vis='🍪'.repeat(a)+'  ➖  '+'✋'+b; }
  else { a=1+Math.floor(Math.random()*5); b=1+Math.floor(Math.random()*5); ans=a*b;
    vis=Array.from({length:a},()=>'🟣'.repeat(b)).join('  '); }
  // options
  const set=new Set([ans]);
  while(set.size<3){ let d=ans+ (Math.floor(Math.random()*7)-3); if(d>=0 && d!==ans) set.add(d); }
  return {a,b,op,ans,vis,opts:shuffle([...set])};
}
function mathQuiz(){
  const p=makeProblem(mathOp); mq={p,done:false};
  const opword = mathOp==='+'?'บวก':mathOp==='-'?'ลบ':'คูณ';
  document.getElementById('area').innerHTML=`
    <div class="tabs" style="margin-bottom:14px"><button class="tab math on">${mathOp==='+'?'➕ บวก':mathOp==='-'?'➖ ลบ':'✖️ คูณ'}</button></div>
    <div class="prompt">
      <div class="q">${p.a} ${p.op} ${p.b} = ?</div>
      <div class="visual">${p.vis}</div>
      <button class="btn ghost hintbtn" id="hint" style="max-width:200px;margin:8px auto 0">🔊 ฟังโจทย์</button>
    </div>
    <div class="options">
      ${p.opts.map(o=>`<button class="opt" data-a="${o}">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>`;
  document.getElementById('hint').onclick=()=>speakSeq([numTH(p.a), OPWORD[mathOp], numTH(p.b), 'เท่ากับเท่าไร']);
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(mq.done) return;
    const fb=document.getElementById('fb');
    if(parseInt(b.dataset.a,10)===p.ans){
      mq.done=true; b.classList.add('right'); chime(true); confetti(); addStar();
      const pr=rnd(praise); fb.className='feedback g'; fb.textContent=`${p.a} ${p.op} ${p.b} = ${p.ans}  ⭐`;
      speakSeq([pr, numTH(p.a), OPWORD[mathOp], numTH(p.b), 'เท่ากับ', numTH(p.ans)]);
      setTimeout(mathQuiz,1600);
    }else{
      b.classList.add('wrong'); chime(false);
      const r=rnd(retry); fb.className='feedback b'; fb.textContent=r; speak(r,'th-TH',1);
      setTimeout(()=>b.classList.remove('wrong'),450);
    }
  });
}
